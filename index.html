    <title>Calculus's Math Notes</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --link-color: #228ae6;
            --link-hover: #1b6ec2;
            --date-color: #868e96;
            --border-color: #dee2e6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #212529;
        }
        .description {
            color: var(--date-color);
            font-size: 1.1rem;
        }
        .post-list {
            list-style: none;
            padding: 0;
        }
        .post-item {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: baseline;
            gap: 1.5rem;
        }
        .post-date {
            color: var(--date-color);
            font-size: 0.9rem;
            min-width: 100px;
            font-family: monospace;
        }
        .post-link {
            color: var(--link-color);
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .post-link:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .post-item {
                flex-direction: column;
                gap: 0.25rem;
                margin-bottom: 2rem;
            }
            body {
                padding: 1rem;
            }
        }
    </style>
</head>
